<!doctype html>

<head>

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }

</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<body>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="variation-audit.jsx"></script>
<script type="text/babel" src="variation-swiss.jsx"></script>
<script type="text/babel" src="variation-terminal.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="sales-consulting"
        title="Sales Consulting · 3 Directions"
        subtitle="Ondřej Kamarýt — auditní dokument · Swiss grid · trader terminal. Drag-uchopte za úchop nahoře pro přerovnání. Klikněte na rozšířit (↗) pro fullscreen."
      >
        <DCArtboard id="audit" label="01 · Audit Document" width={1080} height={4150}>
          <AuditVariation />
        </DCArtboard>

        <DCArtboard id="swiss" label="02 · Swiss Grid (Vignelli)" width={1200} height={3340}>
          <SwissVariation />
        </DCArtboard>

        <DCArtboard id="terminal" label="03 · Bloomberg Terminal" width={1280} height={2800}>
          <TerminalVariation />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="reference"
        title="Reference · Předchozí verze"
        subtitle={'Dark editorial — pro srovnání. (V samostatném souboru: „Ondrej Kamaryt - Sales Consulting.html")'}
      >
        <DCArtboard id="dark-editorial" label="00 · Dark Editorial (reference)" width={1280} height={3800}>
          <iframe
            src="Ondrej Kamaryt - Sales Consulting.html"
            style={{ width: '1280px', height: '3800px', border: 0, background: '#0C0C0E', display: 'block' }}
            title="Dark editorial reference"
          />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
